# Virtual file system root (matches core default; override per environment if needed)
server.port=8082

# 响应压缩(对大型日志查询/聚合响应可省 80%+ 带宽)
server.compression.enabled=true
server.compression.mime-types=application/json,application/javascript,text/html,text/plain,text/css,text/xml
server.compression.min-response-size=1024

spring.datasource.url=jdbc:sqlite:data.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=org.leo.model
mybatis.configuration.map-underscore-to-camel-case=true

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-test-query=SELECT 1


spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:sql/ai_model_schema.sql

# ── AI 配置 (LangChain4j + OpenAI 兼容) ──────────────────────────────
# Agent 含多轮工具调用，响应时间可能超过数分钟，禁用 Spring MVC 异步超时。
spring.mvc.async.request-timeout=-1

# LangChain4j OpenAI 兼容配置（含所有 OpenAI 兼容代理）
leo.ai.openai.api-key=${OPENAI_API_KEY:placeholder-configure-db-or-env}
leo.ai.openai.model=gpt-4o
# 可选；留空则不下发 max_tokens，让模型/网关使用默认值。
leo.ai.openai.max-tokens=
leo.ai.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
# 是否启用 reasoning_content 流（o1/o3/deepseek-reasoner 等模型有效）。
leo.ai.openai.thinking-enabled=false
